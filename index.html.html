<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Eisenlog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#211F1B;
    --ink-2:#2A2721;
    --card:#332F28;
    --card-2:#3D392F;
    --paper:#ECE4D3;
    --paper-dim:#B9AF9A;
    --muted:#8C8576;
    --rust:#C1522E;
    --rust-dim:#8A3B22;
    --brass:#C9A227;
    --brass-dim:#8F7419;
    --olive:#828A5C;
    --line:rgba(236,228,211,0.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--paper);font-family:'Inter',sans-serif;}
  body{overscroll-behavior-y:none; user-select:none;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;background:var(--ink);}
  h1,h2,h3{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:0.02em;margin:0;text-transform:uppercase;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:'JetBrains Mono',monospace;color:var(--paper);background:var(--card-2);border:1px solid var(--line);border-radius:6px;padding:10px;font-size:16px;width:100%;}
  input:focus{outline:none;border-color:var(--rust);}
  input::placeholder{color:var(--muted);font-family:'Inter',sans-serif;}

  header.topbar{padding:22px 20px 14px;border-bottom:1px solid var(--line);flex-shrink:0;}
  header.topbar h1{font-size:26px;color:var(--paper);}
  header.topbar p{margin:4px 0 0;color:var(--muted);font-size:13px;}

  main{flex:1;overflow-y:auto;padding:16px 16px 96px;}
  .screen{display:none;}
  .screen.active{display:block;}

  nav.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--ink-2);border-top:1px solid var(--line);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
  nav.tabbar button{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:11px;font-weight:500;}
  nav.tabbar button.active{color:var(--rust);}
  nav.tabbar svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:8px;font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:0.03em;}
  .btn-primary{background:var(--rust);color:var(--paper);}
  .btn-primary:active{background:var(--rust-dim);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--paper);}
  .btn-ghost:active{background:var(--card-2);}
  .btn-block{width:100%;}
  .btn-sm{padding:8px 12px;font-size:12px;}

  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .pill{background:var(--card-2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--paper-dim);}
  .muted{color:var(--muted);}
  .divider{height:1px;background:var(--line);margin:14px 0;}

  /* Plattenturm */
  .plateStack{display:flex;flex-direction:column-reverse;align-items:center;gap:4px;height:150px;justify-content:flex-start;}
  .plate{height:14px;border-radius:3px;background:var(--rust);transition:width .3s ease;}
  .plateTrack{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:150px;}

  .setChip{display:flex;align-items:center;gap:8px;background:var(--card-2);border-radius:8px;padding:8px 10px;font-size:13px;}
  .setChip .pr{background:var(--brass);color:#3A2E06;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.03em;}

  .exCard{border-left:3px solid var(--rust-dim);}
  .exCard h3{font-size:16px;color:var(--paper);}

  .planItem{display:flex;justify-content:space-between;align-items:center;padding:14px 4px;border-bottom:1px solid var(--line);}
  .planItem:last-child{border-bottom:none;}

  .timerBar{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--brass);color:#3A2E06;padding:10px 20px;display:none;align-items:center;justify-content:space-between;z-index:40;font-weight:600;}
  .timerBar.show{display:flex;}

  .chartWrap{width:100%;height:180px;}
  select{font-family:'Inter',sans-serif;background:var(--card-2);color:var(--paper);border:1px solid var(--line);border-radius:6px;padding:10px;width:100%;font-size:14px;}

  .empty{text-align:center;padding:40px 10px;color:var(--muted);}
  .empty svg{width:40px;height:40px;stroke:var(--muted);fill:none;stroke-width:1.5;margin-bottom:10px;}

  .fab{position:fixed;top:0;}
  .removeBtn{color:var(--muted);font-size:18px;line-height:1;padding:4px 8px;}
  .addRow{display:flex;gap:8px;}
  .addRow input{flex:1;}

  .statGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:var(--card-2);border-radius:10px;padding:12px 14px;}
  .stat .n{font-size:20px;font-weight:700;}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.03em;margin-top:2px;}
</style>
</head>
<body>
<div id="app">

  <header class="topbar"><h1 id="screenTitle">Heute</h1><p id="screenSub">Bereit für die nächste Einheit</p></header>

  <main>
    <section class="screen active" id="screen-heute"></section>
    <section class="screen" id="screen-plaene"></section>
    <section class="screen" id="screen-verlauf"></section>
    <section class="screen" id="screen-fortschritt"></section>
  </main>

  <div class="timerBar" id="timerBar">
    <span class="mono" id="timerLabel">01:30</span>
    <div class="row" style="gap:8px;">
      <button class="btn btn-sm" style="background:#3A2E06;color:var(--brass);" onclick="adjustTimer(30)">+30s</button>
      <button class="btn btn-sm" style="background:#3A2E06;color:var(--brass);" onclick="skipTimer()">Überspringen</button>
    </div>
  </div>

  <nav class="tabbar">
    <button data-screen="heute" class="active" onclick="switchScreen('heute')">
      <svg viewBox="0 0 24 24"><path d="M6.5 7v10M17.5 7v10M2 10v4M22 10v4M6.5 12h11" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Heute
    </button>
    <button data-screen="plaene" onclick="switchScreen('plaene')">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10" stroke-linecap="round"/></svg>
      Pläne
    </button>
    <button data-screen="verlauf" onclick="switchScreen('verlauf')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2M9 2h6" stroke-linecap="round"/></svg>
      Verlauf
    </button>
    <button data-screen="fortschritt" onclick="switchScreen('fortschritt')">
      <svg viewBox="0 0 24 24"><path d="M4 20V10M12 20V4M20 20v-7" stroke-linecap="round"/></svg>
      Fortschritt
    </button>
  </nav>
</div>

<script>
const S = window.storage;
let plans = [];
let history = [];
let active = null;
let timerInterval = null;
let timerSeconds = 0;

const titles = {
  heute: ['Heute','Bereit für die nächste Einheit'],
  plaene: ['Pläne','Deine Trainingspläne'],
  verlauf: ['Verlauf','Vergangene Einheiten'],
  fortschritt: ['Fortschritt','Entwicklung pro Übung']
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

async function loadAll(){
  try{
    const p = await S.get('plans');
    plans = p ? JSON.parse(p.value) : defaultPlans();
    if(!p) await S.set('plans', JSON.stringify(plans));
  }catch(e){ plans = defaultPlans(); await S.set('plans', JSON.stringify(plans)); }

  try{
    const h = await S.get('workout-history');
    history = h ? JSON.parse(h.value) : [];
  }catch(e){ history = []; }

  try{
    const a = await S.get('active-workout');
    active = a ? JSON.parse(a.value) : null;
  }catch(e){ active = null; }

  render();
}

function defaultPlans(){
  return [
    {id:uid(), name:'Ganzkörper', exercises:['Kniebeuge','Bankdrücken','Rudern','Schulterdrücken','Kreuzheben']},
    {id:uid(), name:'Oberkörper', exercises:['Bankdrücken','Rudern','Schulterdrücken','Bizeps Curls','Trizeps Drücken']},
    {id:uid(), name:'Unterkörper', exercises:['Kniebeuge','Kreuzheben','Ausfallschritte','Wadenheben']}
  ];
}

async function savePlans(){ try{ await S.set('plans', JSON.stringify(plans)); }catch(e){} }
async function saveHistory(){ try{ await S.set('workout-history', JSON.stringify(history)); }catch(e){} }
async function saveActive(){
  try{
    if(active) await S.set('active-workout', JSON.stringify(active));
    else await S.delete('active-workout');
  }catch(e){}
}

function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.screen===name));
  document.getElementById('screenTitle').textContent = titles[name][0];
  document.getElementById('screenSub').textContent = titles[name][1];
  if(name==='fortschritt') renderFortschritt();
}

function render(){
  renderHeute();
  renderPlaene();
  renderVerlauf();
}

/* ---------- HEUTE ---------- */
function bestWeightFor(name){
  let best = 0;
  history.forEach(w=>w.exercises.forEach(e=>{ if(e.name===name) e.sets.forEach(s=>{ if(s.weight>best) best=s.weight; }); }));
  if(active) active.exercises.forEach(e=>{ if(e.name===name) e.sets.forEach(s=>{ if(s.weight>best) best=s.weight; }); });
  return best;
}

function totalVolume(w){
  let v=0; w.exercises.forEach(e=>e.sets.forEach(s=>v+=s.weight*s.reps)); return v;
}

function renderHeute(){
  const el = document.getElementById('screen-heute');
  if(!active){
    let html = `<div class="stack">`;
    html += `<div class="card"><h3 style="margin-bottom:10px;">Training starten</h3><div class="stack">`;
    plans.forEach(p=>{
      html += `<button class="btn btn-ghost btn-block" style="justify-content:space-between;" onclick="startWorkout('${p.id}')"><span>${escapeHtml(p.name)}</span><span class="muted mono">${p.exercises.length} Übungen</span></button>`;
    });
    html += `</div><div class="divider"></div><button class="btn btn-primary btn-block" onclick="startWorkout(null)">Freies Training</button></div>`;
    if(history.length){
      const last = history[history.length-1];
      html += `<div class="card"><div class="row"><span class="muted" style="font-size:12px;">Letzte Einheit</span><span class="muted mono" style="font-size:12px;">${formatDate(last.date)}</span></div>
      <div class="row" style="margin-top:6px;"><h3>${escapeHtml(last.planName||'Freies Training')}</h3><span class="mono" style="color:var(--rust);">${Math.round(totalVolume(last))} kg</span></div></div>`;
    }
    html += `</div>`;
    el.innerHTML = html;
    return;
  }

  const vol = totalVolume(active);
  const target = 3000;
  const plateCount = Math.min(10, Math.max(1, Math.round((vol/target)*10)));

  let html = `<div class="stack">`;
  html += `<div class="card">
    <div class="row"><h3>${escapeHtml(active.planName||'Freies Training')}</h3><span class="pill mono">${Math.round(vol)} kg gesamt</span></div>
    <div class="plateTrack" style="margin-top:14px;">`;
  for(let i=0;i<plateCount;i++){
    const w = 40 + i*6;
    html += `<div class="plate" style="width:${w}%;"></div>`;
  }
  html += `</div>
    <p class="muted" style="text-align:center;font-size:11px;margin-top:6px;">Plattenturm · Volumen dieser Einheit</p>
  </div>`;

  active.exercises.forEach((ex, exi)=>{
    html += `<div class="card exCard"><div class="row"><h3>${escapeHtml(ex.name)}</h3><button class="removeBtn" onclick="removeExercise(${exi})">&times;</button></div>`;
    if(ex.sets.length){
      html += `<div class="stack" style="margin-top:10px;">`;
      ex.sets.forEach((s,si)=>{
        html += `<div class="setChip"><span class="mono">Satz ${si+1}</span><span class="mono">${s.weight} kg × ${s.reps}</span>${s.isPR?'<span class="pr">PR</span>':''}</div>`;
      });
      html += `</div>`;
    }
    html += `<div class="addRow" style="margin-top:10px;">
      <input type="number" inputmode="decimal" placeholder="kg" id="w-${exi}">
      <input type="number" inputmode="numeric" placeholder="Wdh" id="r-${exi}">
      <button class="btn btn-primary btn-sm" onclick="logSet(${exi})">+</button>
    </div></div>`;
  });

  html += `<div class="card">
    <div class="addRow"><input type="text" placeholder="Übung hinzufügen" id="newExName"><button class="btn btn-ghost btn-sm" onclick="addExercise()">+</button></div>
  </div>`;
  html += `<button class="btn btn-primary btn-block" onclick="finishWorkout()">Training beenden</button>`;
  html += `</div>`;
  el.innerHTML = html;
}

function startWorkout(planId){
  const plan = planId ? plans.find(p=>p.id===planId) : null;
  active = {
    planName: plan ? plan.name : null,
    startedAt: Date.now(),
    exercises: plan ? plan.exercises.map(n=>({name:n, sets:[]})) : []
  };
  saveActive(); renderHeute();
}

function addExercise(){
  const inp = document.getElementById('newExName');
  const name = inp.value.trim();
  if(!name) return;
  active.exercises.push({name, sets:[]});
  saveActive(); renderHeute();
}

function removeExercise(i){
  active.exercises.splice(i,1);
  saveActive(); renderHeute();
}

function logSet(exi){
  const w = parseFloat(document.getElementById('w-'+exi).value);
  const r = parseInt(document.getElementById('r-'+exi).value);
  if(!w || !r) return;
  const name = active.exercises[exi].name;
  const isPR = w > bestWeightFor(name);
  active.exercises[exi].sets.push({weight:w, reps:r, isPR});
  saveActive();
  renderHeute();
  startRestTimer(90);
}

function finishWorkout(){
  active.date = Date.now();
  active.exercises = active.exercises.filter(e=>e.sets.length>0);
  if(active.exercises.length===0){ active=null; saveActive(); renderHeute(); return; }
  history.push(active);
  saveHistory();
  active = null;
  saveActive();
  stopTimerUI();
  render();
}

/* ---------- REST TIMER ---------- */
function startRestTimer(sec){
  timerSeconds = sec;
  document.getElementById('timerBar').classList.add('show');
  updateTimerLabel();
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timerSeconds--;
    if(timerSeconds<=0){ stopTimerUI(); return; }
    updateTimerLabel();
  },1000);
}
function updateTimerLabel(){
  const m = Math.floor(timerSeconds/60).toString().padStart(2,'0');
  const s = (timerSeconds%60).toString().padStart(2,'0');
  document.getElementById('timerLabel').textContent = m+':'+s;
}
function adjustTimer(delta){ timerSeconds = Math.max(0,timerSeconds+delta); updateTimerLabel(); }
function skipTimer(){ stopTimerUI(); }
function stopTimerUI(){ clearInterval(timerInterval); document.getElementById('timerBar').classList.remove('show'); }

/* ---------- PLÄNE ---------- */
function renderPlaene(){
  const el = document.getElementById('screen-plaene');
  let html = `<div class="stack">`;
  plans.forEach(p=>{
    html += `<div class="card">
      <div class="row"><h3>${escapeHtml(p.name)}</h3><button class="removeBtn" onclick="deletePlan('${p.id}')">&times;</button></div>
      <div class="stack" style="margin-top:8px;">`;
    p.exercises.forEach((ex,i)=>{
      html += `<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line);"><span style="font-size:14px;">${escapeHtml(ex)}</span><button class="removeBtn" onclick="removePlanExercise('${p.id}',${i})">&times;</button></div>`;
    });
    html += `</div>
      <div class="addRow" style="margin-top:10px;">
        <input type="text" placeholder="Übung hinzufügen" id="pex-${p.id}">
        <button class="btn btn-ghost btn-sm" onclick="addPlanExercise('${p.id}')">+</button>
      </div>
    </div>`;
  });
  html += `<div class="card">
    <div class="addRow"><input type="text" placeholder="Neuer Plan (Name)" id="newPlanName"><button class="btn btn-primary btn-sm" onclick="addPlan()">+</button></div>
  </div></div>`;
  el.innerHTML = html;
}

function addPlan(){
  const inp = document.getElementById('newPlanName');
  const name = inp.value.trim();
  if(!name) return;
  plans.push({id:uid(), name, exercises:[]});
  savePlans(); renderPlaene(); renderHeute();
}
function deletePlan(id){
  plans = plans.filter(p=>p.id!==id);
  savePlans(); renderPlaene(); renderHeute();
}
function addPlanExercise(id){
  const inp = document.getElementById('pex-'+id);
  const name = inp.value.trim();
  if(!name) return;
  const plan = plans.find(p=>p.id===id);
  plan.exercises.push(name);
  savePlans(); renderPlaene();
}
function removePlanExercise(id,i){
  const plan = plans.find(p=>p.id===id);
  plan.exercises.splice(i,1);
  savePlans(); renderPlaene();
}

/* ---------- VERLAUF ---------- */
function formatDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
}
function renderVerlauf(){
  const el = document.getElementById('screen-verlauf');
  if(!history.length){
    el.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/></svg><p>Noch keine Einheiten geloggt.</p></div>`;
    return;
  }
  let html = `<div class="stack">`;
  [...history].reverse().forEach((w,idx)=>{
    const realIdx = history.length-1-idx;
    const totalSets = w.exercises.reduce((a,e)=>a+e.sets.length,0);
    html += `<div class="card">
      <div class="row"><h3>${escapeHtml(w.planName||'Freies Training')}</h3><span class="mono muted" style="font-size:12px;">${formatDate(w.date)}</span></div>
      <div class="row" style="margin-top:8px;">
        <span class="muted" style="font-size:12px;">${totalSets} Sätze · ${w.exercises.length} Übungen</span>
        <span class="mono" style="color:var(--rust);">${Math.round(totalVolume(w))} kg</span>
      </div>
      <button class="btn btn-ghost btn-sm btn-block" style="margin-top:10px;" onclick="toggleDetail(${realIdx})">Details</button>
      <div id="detail-${realIdx}" style="display:none;margin-top:10px;">
        ${w.exercises.map(e=>`<div style="margin-bottom:8px;"><div class="muted" style="font-size:12px;margin-bottom:4px;">${escapeHtml(e.name)}</div>
          <div class="stack" style="gap:6px;">${e.sets.map(s=>`<div class="setChip">${s.weight} kg × ${s.reps}${s.isPR?'<span class="pr">PR</span>':''}</div>`).join('')}</div></div>`).join('')}
      </div>
    </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}
function toggleDetail(i){
  const d = document.getElementById('detail-'+i);
  d.style.display = d.style.display==='none' ? 'block' : 'none';
}

/* ---------- FORTSCHRITT ---------- */
function allExerciseNames(){
  const set = new Set();
  history.forEach(w=>w.exercises.forEach(e=>set.add(e.name)));
  if(active) active.exercises.forEach(e=>set.add(e.name));
  return [...set];
}

function renderFortschritt(){
  const el = document.getElementById('screen-fortschritt');
  const names = allExerciseNames();
  if(!names.length){
    el.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><path d="M4 20V10M12 20V4M20 20v-7"/></svg><p>Noch keine Daten. Logge dein erstes Training.</p></div>`;
    return;
  }
  const current = el.dataset.selected && names.includes(el.dataset.selected) ? el.dataset.selected : names[0];
  el.dataset.selected = current;

  let html = `<select id="exSelect" onchange="onExerciseChange(this.value)">`;
  names.forEach(n=> html += `<option value="${escapeHtml(n)}" ${n===current?'selected':''}>${escapeHtml(n)}</option>`);
  html += `</select><div class="card" style="margin-top:14px;">`;

  const points = [];
  history.forEach(w=>{
    let max=0;
    w.exercises.forEach(e=>{ if(e.name===current) e.sets.forEach(s=>{ if(s.weight>max) max=s.weight; }); });
    if(max>0) points.push({date:w.date, weight:max});
  });

  if(points.length===0){
    html += `<p class="muted" style="text-align:center;padding:30px 0;">Noch keine abgeschlossenen Einheiten für diese Übung.</p>`;
  } else {
    html += `<div class="chartWrap">${buildChartSVG(points)}</div>`;
  }
  html += `</div>`;

  const best = Math.max(0, ...points.map(p=>p.weight));
  const totalSets = history.reduce((a,w)=>a + w.exercises.filter(e=>e.name===current).reduce((b,e)=>b+e.sets.length,0), 0);
  const totalVol = history.reduce((a,w)=>a + w.exercises.filter(e=>e.name===current).reduce((b,e)=>b+e.sets.reduce((c,s)=>c+s.weight*s.reps,0),0), 0);

  html += `<div class="statGrid">
    <div class="stat"><div class="n mono" style="color:var(--brass);">${best} kg</div><div class="l">Bestleistung</div></div>
    <div class="stat"><div class="n mono">${totalSets}</div><div class="l">Sätze gesamt</div></div>
    <div class="stat" style="grid-column:1/3;"><div class="n mono">${Math.round(totalVol)} kg</div><div class="l">Gesamtvolumen</div></div>
  </div>`;

  el.innerHTML = html;
}
function onExerciseChange(v){
  document.getElementById('screen-fortschritt').dataset.selected = v;
  renderFortschritt();
}

function buildChartSVG(points){
  const w=440, h=170, pad=30;
  const maxW = Math.max(...points.map(p=>p.weight)) * 1.15;
  const minW = 0;
  const stepX = points.length>1 ? (w-2*pad)/(points.length-1) : 0;
  const coords = points.map((p,i)=>{
    const x = pad + i*stepX;
    const y = h-pad - ((p.weight-minW)/(maxW-minW||1))*(h-2*pad);
    return {x,y,...p};
  });
  const path = coords.map((c,i)=> (i===0?'M':'L')+c.x.toFixed(1)+','+c.y.toFixed(1)).join(' ');
  const bestVal = Math.max(...points.map(p=>p.weight));
  let dots = coords.map(c=>{
    const isBest = c.weight===bestVal;
    return `<circle cx="${c.x}" cy="${c.y}" r="${isBest?5:3.5}" fill="${isBest?'#C9A227':'#C1522E'}" />`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%">
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="rgba(236,228,211,0.15)"/>
    <path d="${path}" fill="none" stroke="#C1522E" stroke-width="2"/>
    ${dots}
  </svg>`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
