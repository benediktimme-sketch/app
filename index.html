<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Meine App</title>

<!-- 🍎 iOS APP MODE -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eisenlog">

<!-- ICON + SPLASH -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="apple-touch-startup-image" href="splash.png">

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#211F1B;
    --ink-2:#2A2721;
    --card:#332F28;
    --card-2:#3D392F;
    --paper:#ECE4D3;
    --muted:#8C8576;
    --rust:#C1522E;
    --rust-dim:#8A3B22;
    --brass:#C9A227;
    --line:rgba(236,228,211,0.12);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--paper);font-family:'Inter',sans-serif;}
  body{user-select:none;overscroll-behavior-y:none;}

  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  h1,h2,h3{font-family:'Oswald',sans-serif;margin:0;text-transform:uppercase;}

  button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;}
  input,select{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid var(--line);
    background:var(--card-2);
    color:var(--paper);
    font-family:'Inter';
  }

  header{padding:20px;border-bottom:1px solid var(--line);}
  main{flex:1;overflow:auto;padding:16px 16px 90px;}

  .card{background:var(--card);padding:14px;border-radius:10px;margin-bottom:10px;border:1px solid var(--line);}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .stack{display:flex;flex-direction:column;gap:10px;}

  .btn{padding:10px 14px;border-radius:8px;font-weight:600;}
  .btn-primary{background:var(--rust);}
  .btn-ghost{border:1px solid var(--line);}

  nav{
    position:fixed;bottom:0;left:0;right:0;
    max-width:480px;margin:auto;
    display:flex;background:var(--ink-2);
    border-top:1px solid var(--line);
  }

  nav button{flex:1;padding:10px;font-size:12px;color:#aaa;}
  nav button.active{color:var(--rust);}

  .screen{display:none;}
  .screen.active{display:block;}
</style>
</head>

<body>
<div id="app">

<header>
  <h1>Eisenlog</h1>
</header>

<main>

<section id="home" class="screen active"></section>
<section id="plans" class="screen"></section>
<section id="history" class="screen"></section>

</main>

<nav>
  <button onclick="show('home')" class="active">Heute</button>
  <button onclick="show('plans')">Pläne</button>
  <button onclick="show('history')">Verlauf</button>
</nav>

</div>

<script>

/* =========================
   FIXED STORAGE (GITHUB SAFE)
========================= */
const S = {
  get(key){
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  },
  set(key,value){
    localStorage.setItem(key, JSON.stringify(value));
  },
  del(key){
    localStorage.removeItem(key);
  }
};

/* =========================
   STATE
========================= */
let plans = S.get("plans") || [
  {name:"Ganzkörper",ex:["Kniebeuge","Bankdrücken","Rudern"]},
];

let history = S.get("history") || [];

/* =========================
   NAV
========================= */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* =========================
   RENDER HOME
========================= */
function renderHome(){
  const el = document.getElementById("home");

  el.innerHTML = `
    <div class="card">
      <h3>Start Training</h3>
      ${plans.map(p=>`
        <button class="btn btn-ghost" onclick="start('${p.name}')">
          ${p.name}
        </button>
      `).join("")}
    </div>
  `;
}

/* =========================
   START WORKOUT
========================= */
let active = null;

function start(name){
  const plan = plans.find(p=>p.name===name);
  active = {name,sets:[]};
  alert("Workout gestartet: " + name);
}

/* =========================
   SAVE
========================= */
function save(){
  S.set("plans",plans);
  S.set("history",history);
}

/* =========================
   INIT
========================= */
renderHome();

</script>

</body>
</html>
